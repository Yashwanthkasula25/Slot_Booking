<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Slot Booking System</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #526077;
      --bg: #f1f5f9;
      --surface: #ffffff;
      --line: #dbe3ef;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --danger: #c2410c;
      --danger-dark: #9a3412;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      background-image:
        radial-gradient(circle at 10% -20%, #bae6fd 0, transparent 34%),
        radial-gradient(circle at 90% -10%, #bbf7d0 0, transparent 32%);
    }
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e2e8f0;
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .logo {
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.2px;
    }
    .logo-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .nav-links a {
      text-decoration: none;
      color: #334155;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 999px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .nav-links a:hover,
    .nav-links a.active {
      background: #ccfbf1;
      color: var(--primary);
    }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px) scale(1.01); }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    .btn-danger:hover { background: var(--danger-dark); }
    .auth-wrap {
      min-height: calc(100vh - 74px);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(100%, 440px);
      background: var(--surface);
      padding: 24px;
      margin-top: 30px;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.1);
      border: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 2.2vw, 2rem);
      text-align: center;
    }
    .sub {
      margin: 0 0 20px;
      color: var(--muted);
      text-align: center;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.92rem;
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 14px;
      font: inherit;
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.25);
    }
    .error {
      background: #ffedd5;
      color: #9a3412;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 14px;
      font-size: 0.92rem;
    }
    .footer-link {
      text-align: center;
      margin-top: 14px;
      color: var(--muted);
    }
    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    @media (max-width: 560px) {
      .card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a href="/" class="logo"><span class="logo-dot"></span>Slot Booking System</a>
      <nav class="nav-links">
        {% if user.is_authenticated %}
        <a href="{% url 'my_bookings' %}">My Bookings</a>
        <form action="{% url 'logout' %}" method="post" style="margin:0;">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Logout</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}" class="active">Login</a>
        <a href="/register/" class="btn btn-primary">Register</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="auth-wrap">
    <section class="card">
      <h1>Login</h1>
      <p class="sub">Access your booking dashboard</p>

      {% if form.errors %}
      <div class="error">Invalid username or password.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="username">Username</label>
        <input id="username" type="text" name="username" placeholder="Enter username" required />

        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Enter password" required />

        <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
      </form>

      <p class="footer-link">New user? <a href="/register/">Create account</a></p>
    </section>
  </main>
</body>
</html>
